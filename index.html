<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Guess</title>
    <style>
        :root {
            --blur-amount: 40px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .image-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            border-radius: 10px;
            border: 4px solid #333;
        }

        #target-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* The magic happens here */
            filter: blur(var(--blur-amount));
            transition: filter 0.5s ease;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            width: 70%;
            margin-bottom: 1rem;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #message {
            margin-top: 1rem;
            font-weight: bold;
            height: 1.2rem;
        }

        .stats {
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Who is this Year 10 student</h1>
    
    <div class="image-wrapper">
        <img id="target-image" alt="Mystery Person">
    </div>

    <input type="text" id="guess-input" placeholder="Type your guess..." autofocus>
    <button onclick="checkGuess()">Guess</button>

    <div id="message"></div>
    <div class="stats" id="stats">Attempts remaining: 5</div>
    <div class="stats" id="streak-stats">Streak: 0</div>
</div>

<script>
    // List of available images in the images/ folder
    const imageFiles = [
        "Adrian Semmler.jpg",
        "Samuel Wang.jpg",
        "Scott Jin.jpg",
        "Sean Dong.jpg",
        "Sebastien Clemenger.jpg",
        "Sid Provan.jpg",
        "Slade Fletcher.jpg",
        "Stirling Walker.jpg",
        "Tate McFarlane-Smith.jpg",
        "Ted Richmond-Smith.jpg",
        "Thomas Dent.jpg",
        "Thomas Hartman.jpg",
        "Thomas Lin.jpg",
        "Thomas Raftopoulos.jpg",
        "Tim Zheng.jpg",
        "Toby Ludeman.jpg",
        "Toby Stevenson.jpg",
        "Tom Wilson.jpg",
        "Vraj Gandhi.jpg",
        "Will Harris.jpg",
        "Will Luo.jpg",
        "William Clyde.jpg",
        "William Delzoppo.jpg",
        "William Kenafacke.jpg",
        "Xavier Lu.jpg",
        "Yu-Tong Guo.jpg",
        "Yuvin DeSilva.jpg",
        "Ziv Zhou.jpg"
    ];

    let secretName = "";
    let blurValue = 20;                  // Starting blur
    let attempts = 5;                    
    let streak = 0;                      
    const blurStep = 4;                 // How much to unblur

    const img = document.getElementById('target-image');
    const input = document.getElementById('guess-input');
    const message = document.getElementById('message');
    const stats = document.getElementById('stats');
    const streakStats = document.getElementById('streak-stats');

    function loadNewImage() {
        // Picks random image from the list
        const randomFile = imageFiles[Math.floor(Math.random() * imageFiles.length)];
        
        // Gets  name from the filename 
        const lastDotIndex = randomFile.lastIndexOf('.');
        secretName = lastDotIndex !== -1 ? randomFile.substring(0, lastDotIndex) : randomFile; // The answer

        // Reset variables
        blurValue = 20;
        attempts = 5;

        
        img.src = "images/" + randomFile;
        document.documentElement.style.setProperty('--blur-amount', blurValue + 'px');
        stats.textContent = `Attempts remaining: ${attempts}`;
        message.textContent = "";
        input.disabled = false;
        input.value = "";
        input.focus();
    }

    // Initialize first image
    loadNewImage();

    function checkGuess() {
        const userGuess = input.value.trim();
        
        if (!userGuess) return;

        if (userGuess.toLowerCase() === secretName.toLowerCase()) {
            winGame();
        } else {
            wrongGuess();
        }

        input.value = "";
        input.focus();
    }

    function wrongGuess() {
        attempts--;
        blurValue = Math.max(0, blurValue - blurStep);
        
        // Blur
        document.documentElement.style.setProperty('--blur-amount', blurValue + 'px');
        
        if (attempts > 0) {
            message.textContent = "Not quite! Look closer...";
            message.style.color = "orange";
            stats.textContent = `Attempts remaining: ${attempts}`;
        } else {
            loseGame();
        }
    }

    function winGame() {
        document.documentElement.style.setProperty('--blur-amount', '0px');
        message.textContent = "Correct! It's " + secretName + "!";
        message.style.color = "green";
        input.disabled = true;
        
        // Update streak
        streak++;
        streakStats.textContent = `Streak: ${streak}`;
        
        setTimeout(loadNewImage, 2000);
    }

    function loseGame() {
        document.documentElement.style.setProperty('--blur-amount', '0px');
        message.textContent = "Game Over! It was " + secretName;
        message.style.color = "red";
        stats.textContent = "No attempts left.";
        input.disabled = true;
        
        streak = 0;
        streakStats.textContent = `Streak: ${streak}`;
        
        setTimeout(loadNewImage, 3000);
    }

    input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            checkGuess();
        }
    });
</script>

</body>
</html>
